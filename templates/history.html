<!DOCTYPE html>
<html>
<head>
    <title>Detection History</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            margin:40px;
        }

        h1{
            text-align:center;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th,td{
            border:1px solid #ccc;
            padding:10px;
            text-align:center;
        }

        th{
            background:#f4f4f4;
        }

        a{
            text-decoration:none;
            color:blue;
        }

    </style>

</head>

<body>

<h1>Vehicle Detection History</h1>

<table>

<tr>
    <th>ID</th>
    <th>Plate Number</th>
    <th>Image Name</th>
    <th>Detection Time</th>
    <th>Image</th>
</tr>

{% for row in records %}

<tr>

    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[4] }}</td>

    <td>

        {% if row[3] %}
        <a href="{{ row[3] }}" target="_blank">
            View Image
        </a>
        {% endif %}

    </td>

</tr>

{% endfor %}

</table>

</body>
</html>
